<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verplaats</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #dc3232;
      --accent-hover: #bb2a2a;
      --bg: #ffffff;
      --surface: #fafafa;
      --border: #eeeeee;
      --border-mid: #e0e0e0;
      --text: #1a1a1a;
      --text-muted: #999999;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      gap: 16px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      width: 26px;
      height: 26px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg { width: 14px; height: 14px; }

    h1 {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    #setup { display: flex; flex-direction: column; gap: 12px; }

    #setup p { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
    #setup a { color: var(--accent); text-decoration: none; }

    input[type="password"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border-mid);
      border-radius: 8px;
      color: var(--text);
      font-size: 12px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="password"]:focus { border-color: var(--accent); }

    input[type="text"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border-mid);
      border-radius: 8px;
      color: var(--text);
      font-size: 12px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: var(--accent); }

    #main { display: none; flex-direction: column; gap: 14px; }

    .btn-verplaats {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Segoe UI', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-verplaats:hover { background: var(--accent-hover); }
    .btn-verplaats:active { transform: scale(0.98); }
    .btn-verplaats:disabled {
      background: #e0e0e0;
      color: #aaa;
      cursor: not-allowed;
      transform: none;
    }

    .btn-verplaats svg { width: 17px; height: 17px; flex-shrink: 0; }

    #log { display: flex; flex-direction: column; gap: 5px; }

    .log-line {
      display: flex;
      gap: 7px;
      align-items: flex-start;
      padding: 6px 9px;
      background: var(--surface);
      border-radius: 6px;
      border-left: 2px solid var(--border-mid);
      font-size: 11px;
      font-family: 'Courier New', monospace;
      line-height: 1.4;
      animation: fadeIn 0.2s ease;
      color: #666;
    }

    .log-line.ok { border-color: var(--accent); color: var(--accent); }
    .log-line.err { border-color: #e05050; color: #e05050; }
    .log-line.thinking { border-color: #ccc; color: #999; }

    .log-icon { flex-shrink: 0; }

    #map-choice { display: none; flex-direction: column; gap: 7px; }
    #map-choice p { font-size: 12px; color: var(--text-muted); }

    .map-btn {
      width: 100%;
      padding: 9px 12px;
      background: var(--surface);
      border: 1px solid var(--border-mid);
      border-radius: 8px;
      color: var(--text);
      font-size: 12px;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .map-btn:hover { border-color: var(--accent); background: #fff5f5; }

    .btn-small {
      padding: 8px 14px;
      background: transparent;
      border: 1px solid var(--border-mid);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-small:hover { border-color: var(--accent); color: var(--text); }

    .reset-link {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      cursor: pointer;
      text-decoration: underline;
    }

    .reset-link:hover { color: var(--accent); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 14 14" fill="none">
      <path d="M2 7h10M7 2l5 5-5 5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <h1>Verplaats</h1>
</header>

<div id="setup">
  <p>Voer je <a href="https://console.anthropic.com/keys" target="_blank">Anthropic API-sleutel</a> in. Deze wordt lokaal opgeslagen in je browser.</p>
  <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off" />
  <button class="btn-verplaats" onclick="saveKey()">
    <svg viewBox="0 0 17 17" fill="none"><path d="M8.5 1v9M4 7l4.5 4.5L13 7M2 14h13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Opslaan en starten
  </button>
</div>

<div id="main">
  <button class="btn-verplaats" id="btn-main" onclick="startVerplaats()">
    <svg viewBox="0 0 17 17" fill="none"><path d="M2 8.5h13M9 3l5 5.5-5 5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Verplaats volledige thread
  </button>

  <div id="log"></div>
  <div id="map-choice"></div>

  <span class="reset-link" onclick="resetKey()">API-sleutel wijzigen</span>
</div>

<script>
  const API_URL = 'https://api.anthropic.com/v1/messages';
  let running = false;

  Office.onReady(() => {
    if (localStorage.getItem('anthropic_key')) showMain();
  });

  function saveKey() {
    const key = document.getElementById('api-key-input').value.trim();
    if (!key.startsWith('sk-ant-')) {
      alert('Ongeldige sleutel. Een Anthropic API-sleutel begint met sk-ant-');
      return;
    }
    localStorage.setItem('anthropic_key', key);
    showMain();
  }

  function showMain() {
    document.getElementById('setup').style.display = 'none';
    document.getElementById('main').style.display = 'flex';
  }

  function resetKey() {
    localStorage.removeItem('anthropic_key');
    document.getElementById('setup').style.display = 'flex';
    document.getElementById('main').style.display = 'none';
    document.getElementById('log').innerHTML = '';
  }

  function log(msg, type = '') {
    const icons = { ok: '✓', err: '✗', thinking: '…', '': '·' };
    const el = document.createElement('div');
    el.className = 'log-line ' + type;
    el.innerHTML = `<span class="log-icon">${icons[type] || '·'}</span><span>${msg}</span>`;
    document.getElementById('log').appendChild(el);
    el.scrollIntoView({ behavior: 'smooth' });
  }

  function clearLog() {
    document.getElementById('log').innerHTML = '';
    const mc = document.getElementById('map-choice');
    mc.style.display = 'none';
    mc.innerHTML = '';
  }

  async function startVerplaats() {
    if (running) return;
    running = true;
    clearLog();
    const btn = document.getElementById('btn-main');
    btn.disabled = true;

    try {
      log('Mail ophalen…', 'thinking');
      const item = Office.context.mailbox.item;
      const subject = item.subject || '';
      const from = item.from?.emailAddress || '';
      const conversationId = item.conversationId || '';
      const itemId = item.itemId || '';

      log(`Onderwerp: "${subject}"`, '');
      log(`Afzender: ${from}`, '');

      const apiKey = localStorage.getItem('anthropic_key');

      log('Project analyseren…', 'thinking');
      const analyse = await callClaude(apiKey,
        `Je bent een Outlook-assistent. Analyseer de e-mail en geef ALLEEN JSON terug, geen uitleg, geen markdown.
Formaat: {"project":"naam van project of klant","zoekterm":"basisonderwerp zonder RE/FW"}`,
        `Onderwerp: ${subject}\nAfzender: ${from}\nConversationId: ${conversationId}`
      );

      let parsed;
      try { parsed = JSON.parse(analyse.trim()); }
      catch { throw new Error('Analyse mislukt. Probeer opnieuw.'); }

      log(`Project: "${parsed.project}"`, 'ok');

      log('Passende map zoeken…', 'thinking');
      const mapResult = await callClaude(apiKey,
        `Je bent een Outlook-assistent. Geef een JSON-array van 1 tot 3 meest waarschijnlijke Outlook-submapnamen voor dit project. ALLEEN JSON, geen uitleg. Formaat: ["Map1","Map2"] of [] als je het niet weet.`,
        `Project: "${parsed.project}"\nOnderwerp: "${subject}"\nAfzender: ${from}`
      );

      let maps;
      try { maps = JSON.parse(mapResult.trim()); }
      catch { maps = []; }

      if (maps.length === 0) {
        log('Geen map gevonden. Voer mapnaam in:', 'thinking');
        showManualInput(parsed, conversationId, subject, itemId, apiKey);
        btn.disabled = false;
        running = false;
        return;
      }

      if (maps.length === 1) {
        await verplaats(maps[0], conversationId, subject, itemId, apiKey);
      } else {
        log('Meerdere mappen gevonden. Kies er een:', 'thinking');
        showMapChoice(maps, conversationId, subject, itemId, apiKey);
        btn.disabled = false;
        running = false;
        return;
      }

    } catch (err) {
      log('Fout: ' + err.message, 'err');
    } finally {
      btn.disabled = false;
      running = false;
    }
  }

  function showMapChoice(maps, convId, subject, itemId, apiKey) {
    const el = document.getElementById('map-choice');
    el.style.display = 'flex';
    el.innerHTML = '<p>Kies de juiste map:</p>';
    maps.forEach(map => {
      const btn = document.createElement('button');
      btn.className = 'map-btn';
      btn.textContent = '📁 ' + map;
      btn.onclick = () => { el.style.display = 'none'; verplaats(map, convId, subject, itemId, apiKey); };
      el.appendChild(btn);
    });
  }

  function showManualInput(parsed, convId, subject, itemId, apiKey) {
    const el = document.getElementById('map-choice');
    el.style.display = 'flex';
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = 'Mapnaam (bv. Klanten/Acme)';
    const btn = document.createElement('button');
    btn.className = 'btn-small';
    btn.textContent = 'Verplaatsen';
    btn.onclick = () => {
      const naam = input.value.trim();
      if (!naam) return;
      el.style.display = 'none';
      verplaats(naam, convId, subject, itemId, localStorage.getItem('anthropic_key'));
    };
    el.appendChild(input);
    el.appendChild(btn);
  }

  async function verplaats(mapnaam, conversationId, subject, itemId, apiKey) {
    log(`Verplaatsen naar "${mapnaam}"…`, 'thinking');
    try {
      Office.context.mailbox.item.moveToFolder(mapnaam, (result) => {
        if (result.status === Office.AsyncResultStatus.Succeeded) {
          log(`Thread verplaatst naar "${mapnaam}"`, 'ok');
          log('Klaar! Postvak IN opgekuist.', 'ok');
        } else {
          log(`Doelmap: ${mapnaam}`, 'ok');
          log('Verplaats handmatig als de add-in dit niet automatisch doet.', 'thinking');
        }
      });
    } catch {
      log(`Doelmap: "${mapnaam}" — verplaats handmatig.`, 'thinking');
    }
  }

  async function callClaude(apiKey, system, userMsg) {
    const resp = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 500,
        system,
        messages: [{ role: 'user', content: userMsg }]
      })
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err?.error?.message || `API fout ${resp.status}`);
    }
    const data = await resp.json();
    return data.content?.[0]?.text || '';
  }
</script>
</body>
</html>
